<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Фон (опционально, можно убрать) -->
  <rect width="64" height="64" rx="14" fill="none"/>
  
  <!-- Древко флага -->
  <rect x="16" y="12" width="3" height="40" fill="#2c3e50" rx="1.5"/>
  
  <!-- Шахматный флаг -->
  <rect x="19" y="12" width="30" height="20" fill="#2c3e50" rx="2"/>
  
  <!-- Белые клетки шахматки -->
  <rect x="19" y="12" width="7.5" height="5" fill="#ecf0f1"/>
  <rect x="34" y="12" width="7.5" height="5" fill="#ecf0f1"/>
  <rect x="26.5" y="17" width="7.5" height="5" fill="#ecf0f1"/>
  <rect x="41.5" y="17" width="7.5" height="5" fill="#ecf0f1"/>
  <rect x="19" y="22" width="7.5" height="5" fill="#ecf0f1"/>
  <rect x="34" y="22" width="7.5" height="5" fill="#ecf0f1"/>
  
  <!-- Динамичные полосы (скорость) -->
  <line x1="52" y1="20" x2="58" y2="20" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="26" x2="60" y2="26" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
</svg>